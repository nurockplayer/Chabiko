name: Feature
description: Track a product, content, design, or engineering task.
title: "[feature] "
labels:
  - type:feature
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What user-visible outcome should exist when this is done?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included?
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What should this issue explicitly not do?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checkable criteria.
      value: |
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: refs
    attributes:
      label: References
      description: Planning docs, external resources, or related issues.

